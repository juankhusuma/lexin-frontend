name: Deploying to Production

on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Building Next App
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Dependencies
        run: npm install

      - name: Build Next App
        run: npm run build

      - name: Archive Next App
        run: zip -r next.zip .next

      - name: Sending Next App to Production
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST_IP }}
          username: ${{ secrets.SSH_HOST_USER }}
          password: ${{ secrets.SSH_HOST_PASS }}
          port: ${{ secrets.SSH_PORT }}
          proxy_host: ${{ secrets.SSH_JUMP_HOST_URL }}
          proxy_username: ${{ secrets.SSH_JUMP_HOST_USER }}
          proxy_key: ${{ secrets.SSH_JUMP_HOST_KEY }}
          proxy_port: ${{ secrets.SSH_JUMP_HOST_PORT }}
          proxy_passphrase: ${{ secrets.SSH_JUMP_HOST_PASSPHRASE }}
          source: next.zip
          target: ~/next.zip

      - name: Releasing New Version
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST_IP }}
          username: ${{ secrets.SSH_HOST_USER }}
          password: ${{ secrets.SSH_HOST_PASS }}
          port: ${{ secrets.SSH_PORT }}
          proxy_host: ${{ secrets.SSH_JUMP_HOST_URL }}
          proxy_username: ${{ secrets.SSH_JUMP_HOST_USER }}
          proxy_key: ${{ secrets.SSH_JUMP_HOST_KEY }}
          proxy_port: ${{ secrets.SSH_JUMP_HOST_PORT }}
          proxy_passphrase: ${{ secrets.SSH_JUMP_HOST_PASSPHRASE }}
          script: |
            unzip -o ~/next.zip -d ~/next
            rm ~/next.zip
            sudo systemctl restart next